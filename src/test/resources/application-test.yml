# ── Test profile: uses H2 in-memory DB + disabled Redis autoconfiguration ─────
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false    # Flyway uses PostgreSQL SQL; let Hibernate create the schema for tests

  # Exclude Redis auto-configuration so tests can run without a Redis server.
  # RedisIdempotencyCache is @MockBean'd in tests that need it.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

app:
  idempotency:
    key-expiration-hours: 1
    pending-timeout-seconds: 5
    max-wait-attempts: 10
    wait-interval-ms: 50

  mock-processor:
    success-rate: 0.85
    decline-rate: 0.10
    error-rate: 0.05
    processing-delay-min-ms: 5
    processing-delay-max-ms: 20

logging:
  level:
    com.crescent.pharmacy: DEBUG
    org.springframework.data: WARN
